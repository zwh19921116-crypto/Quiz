<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="landing-hero">
      <div class="logo">🎓</div>
      <h1>Quiz App</h1>
      <p>Create interactive quizzes or test your knowledge — simple, fast, and elegant.</p>
    </div>

    <div class="role-cards">
      <a class="role-card" href="maker.html">
        <div class="card-icon">🛠️</div>
        <h2>Quiz Maker</h2>
        <p>Build and manage quizzes. Add questions, set correct answers, and share with students.</p>

      <a class="role-card" href="viewer.html">
        <div class="card-icon">📝</div>
        <h2>Quiz Viewer</h2>

    </div>
  </div>
