<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Maker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="container">
      <div class="page-header">
        <p class="eyebrow">Authoring Studio</p>
        <h1>Quiz Maker</h1>
        <p class="helper-text">Create your quiz, export <strong>quiz-database.json</strong>, and publish.</p>
      </div>

      <section class="section-card">
        <h2>Quiz Setup</h2>
        <label for="quizTitle">Quiz Title</label>
        <input type="text" id="quizTitle" placeholder="Enter quiz title" />

        <label for="importQuizFile">Import Existing JSON (optional)</label>
        <input type="file" id="importQuizFile" accept="application/json" />
      </section>

      <section class="section-card">
        <h2>Add Question</h2>

        <label for="questionText">Question</label>
        <input type="text" id="questionText" placeholder="Enter question" />

        <label for="option1">Option 1</label>
        <input type="text" id="option1" placeholder="Option 1" />

        <label for="option2">Option 2</label>
        <input type="text" id="option2" placeholder="Option 2" />

        <label for="option3">Option 3</label>
        <input type="text" id="option3" placeholder="Option 3" />

        <label for="option4">Option 4</label>
        <input type="text" id="option4" placeholder="Option 4" />

        <label for="correctAnswer">Correct Answer</label>
        <select id="correctAnswer">
          <option value="0">Option 1</option>
          <option value="1">Option 2</option>
          <option value="2">Option 3</option>
          <option value="3">Option 4</option>
        </select>

        <label for="solutionText">Solution</label>
        <textarea id="solutionText" rows="3" placeholder="Explain why this answer is correct"></textarea>

        <div class="button-group">
          <button class="btn" id="addQuestionBtn">Add Question</button>
          <button class="btn secondary" id="downloadQuizBtn">Download quiz-database.json</button>
          <button class="btn secondary" id="copyJsonBtn">Copy JSON</button>
          <button class="btn danger" id="clearQuizBtn">Clear Quiz</button>
        </div>
      </section>

      <section class="section-card">
        <h2>Questions</h2>
        <div id="questionsList"></div>
      </section>

      <section class="section-card">
        <h2>Generated JSON</h2>
        <textarea id="generatedJson" rows="12" readonly></textarea>
        <p class="helper-text">Replace <strong>quiz-database.json</strong> in your repository and push to publish updates.</p>
      </section>
    </div>
  </div>

  <script src="maker.js"></script>
</body>
</html>
