<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Maker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Quiz Maker</h1>
    <p class="helper-text">Build a quiz and export <strong>quiz-database.json</strong> for the viewer page.</p>

    <label>Quiz Title</label>
    <input type="text" id="quizTitle" placeholder="Enter quiz title" />

    <hr />

    <h2>Add Question</h2>

    <label>Question</label>
    <input type="text" id="questionText" placeholder="Enter question" />

    <label>Option 1</label>
    <input type="text" id="option1" placeholder="Option 1" />

    <label>Option 2</label>
    <input type="text" id="option2" placeholder="Option 2" />

    <label>Option 3</label>
    <input type="text" id="option3" placeholder="Option 3" />

    <label>Option 4</label>
    <input type="text" id="option4" placeholder="Option 4" />

    <label>Correct Answer</label>
    <select id="correctAnswer">
      <option value="0">Option 1</option>
      <option value="1">Option 2</option>
      <option value="2">Option 3</option>
      <option value="3">Option 4</option>
    </select>

    <div class="button-group">
      <button class="btn" id="addQuestionBtn">Add Question</button>
      <button class="btn secondary" id="downloadQuizBtn">Download quiz-database.json</button>
      <button class="btn secondary" id="copyJsonBtn">Copy JSON</button>
      <button class="btn danger" id="clearQuizBtn">Clear Quiz</button>
    </div>

    <label for="importQuizFile">Import existing JSON (optional)</label>
    <input type="file" id="importQuizFile" accept="application/json" />

    <hr />

    <h2>Questions</h2>
    <div id="questionsList"></div>

    <hr />

    <h2>Generated JSON</h2>
    <textarea id="generatedJson" rows="10" readonly></textarea>
    <p class="helper-text">After download, replace the file named <strong>quiz-database.json</strong> in this repo and push.</p>
  </div>

  <script src="maker.js"></script>
</body>
</html>
