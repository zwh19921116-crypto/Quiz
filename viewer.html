<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="container viewer-container">
      <div class="page-header">
        <p class="eyebrow">Learning Assessment</p>
        <h1 id="quizTitle">Quiz Viewer</h1>
        <p id="quizDescription" class="quiz-description hidden"></p>
      </div>

      <div id="quizSelectorWrap" class="section-card viewer-quiz-picker hidden">
        <label for="quizSelector">Choose Quiz</label>
        <select id="quizSelector"></select>
      </div>

      <div class="progress-row">
        <span id="progressText">Question 1 of 1</span>
        <span id="scoreText">Score: 0</span>
      </div>

      <div class="viewer-progress-track">
        <div id="viewerProgressFill" class="viewer-progress-fill"></div>
      </div>

      <div id="quizContainer"></div>

      <div class="viewer-meta-row">
        <button class="btn secondary" id="notesViewerBtn" type="button" style="display: none;">Notes</button>
        <div id="notesViewerPanel" class="viewer-notes-panel hidden"></div>
      </div>

      <div class="button-group viewer-actions" id="viewerActionBar">
        <button class="btn" id="checkAnswerBtn">Check Answer</button>
        <button class="btn secondary hidden" id="showSolutionBtn" type="button">Show Solution</button>
        <button class="btn secondary" id="nextQuestionBtn" disabled>Next Question</button>
      </div>

      <div id="resultBox"></div>
    </div>
  </div>

  <div id="solutionModal" class="viewer-modal hidden" aria-hidden="true">
    <div class="viewer-modal-backdrop" data-close-solution="true"></div>
    <div class="viewer-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="solutionModalTitle">
      <div class="viewer-modal-header">
        <h2 id="solutionModalTitle">Solution</h2>
        <button class="icon-btn" id="closeSolutionBtn" type="button" aria-label="Close solution">×</button>
      </div>
      <div id="solutionModalBody" class="viewer-modal-body"></div>
    </div>
  </div>

  <script src="viewer.js?v=20260427-1"></script>
</body>
</html>
